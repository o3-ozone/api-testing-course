info:
  name: Login with Wrong Password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "student",
        "password": "wrongpassword123"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("ล็อกอินรหัสผิด ต้องได้ Status 401 Unauthorized", function() {
          expect(res.getStatus()).to.equal(401);
        });

        test("ต้องไม่มีการส่ง Token กลับมา", function() {
          const data = res.getBody();
          expect(data).to.not.have.property('accessToken');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
