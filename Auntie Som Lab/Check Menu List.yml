http:
  method: GET
  url: "{{baseUrl}}/menu"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("ดึงข้อมูลเมนูสำเร็จต้องได้ Status 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("เมนูในร้านต้องมี 2 รายการ", function() {
          const data = res.getBody();
          expect(data).to.be.an('array');
          expect(data.length).to.equal(2);
        });

settings:
